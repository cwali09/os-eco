name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Aggregate quality checks
        run: bun run check:all

      - name: Run tests (CI reporter)
        run: bun run test:ci

      - name: Coverage ratchet
        run: bun run check:coverage

      - name: Test timing summary
        if: always()
        run: bun run report:test-timing

      - name: Code-quality metrics summary
        if: always()
        run: bun run report:quality-metrics

      - name: Upload test timing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-junit
          path: test-results/junit.xml
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-coverage
          path: coverage/lcov.info
          if-no-files-found: warn
